# Application Configuration
server:
  host: "0.0.0.0"
  port: 3000
  log_level: "info"

database:
  # 数据库类型: "mysql" 或 "postgres" 或 "redis" 或 "mongo"
  type: "mysql"
  
  # MySQL配置
  mysql:
    host: "127.0.0.1"
    port: 3306
    username: "root"
    password: "sdsSDG123*^DD"
    database: "wubi_demo_pg"
    max_connections: 10
    
  # PostgreSQL配置（生产环境使用）
  postgres:
    host: "127.0.0.1"
    port: 5433
    username: "postgres"
    password: "password"
    database: "wubi_demo"
    max_connections: 10
    
  # Redis配置（缓存存储）
  redis:
    url: "redis://127.0.0.1:6379"
    max_connections: 10
    
  # MongoDB配置（默认使用）
  mongo:
    uri: "mongodb://127.0.0.1:27017"
    database: "wubi"
    max_pool_size: 10

auth:
  jwt_secret: "your-secret-key-change-in-production"
  token_expiration_hours: 24
