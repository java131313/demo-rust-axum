version: '3.8'

services:
  # MongoDB数据库服务
  mongo:
    image: mongo:7
    container_name: wubi-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: wubi
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      timeout: 5s
      retries: 10
      interval: 5s
    networks:
      - wubi-network

  # Rust Axum应用服务
  wubi-app:
    build: .
    container_name: wubi-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: mongodb://mongo:27017/wubi
      RUST_LOG: info
      JWT_SECRET: your-secret-key-change-in-production
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - wubi-network

  # 前端Vue应用服务（可选）
  frontend:
    image: node:20-alpine
    container_name: wubi-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - wubi-app
    networks:
      - wubi-network

volumes:
  mongo_data:
    driver: local

networks:
  wubi-network:
    driver: bridge
