version: '3.8'

services:
  # PostgreSQL数据库服务
  postgres:
    image: postgres:16-alpine
    container_name: wubi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: wubi_demo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      timeout: 5s
      retries: 10
      interval: 5s
    networks:
      - wubi-network

  # Rust Axum应用服务
  wubi-app:
    build: .
    container_name: wubi-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/wubi_demo
      RUST_LOG: info
      JWT_SECRET: your-secret-key-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wubi-network

  # 前端Vue应用服务（可选）
  frontend:
    image: node:20-alpine
    container_name: wubi-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - wubi-app
    networks:
      - wubi-network

volumes:
  postgres_data:
    driver: local

networks:
  wubi-network:
    driver: bridge
